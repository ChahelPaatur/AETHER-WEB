<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" role="img" aria-label="Chahel Paatur">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="34%" r="46%">
      <stop offset="0" stop-color="#ff4d1c" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ff4d1c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="480" fill="url(#bg)"/>
  <rect width="400" height="480" fill="url(#halo)"/>
  <!-- simple head + shoulders silhouette -->
  <g fill="none" stroke="#3a3a3a" stroke-width="2">
    <circle cx="200" cy="172" r="66"/>
    <path d="M86 452c0-72 51-118 114-118s114 46 114 118"/>
  </g>
  <!-- monogram -->
  <text x="200" y="196" text-anchor="middle" font-family="Geist, Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="-4" fill="#f2f2f2">CP</text>
  <text x="200" y="436" text-anchor="middle" font-family="Geist Mono, ui-monospace, monospace"
        font-size="15" letter-spacing="6" fill="#ff4d1c">CHAHEL PAATUR</text>
</svg>
